name: chess move

on:
  issues:
    types: [opened]
  workflow_dispatch:

concurrency:
  group: chess-game
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  apply-move:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, 'chess|move|')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install deps
        run: npm ci

      - name: parse move from issue title
        id: parse
        if: github.event_name == 'issues'
        run: |
          TITLE='${{ github.event.issue.title }}'
          MOVE=$(echo "$TITLE" | awk -F'|' '{print $3}' | tr -d '[:space:]')
          if [[ ! "$MOVE" =~ ^[a-h][1-8][a-h][1-8][qrbn]?$ ]]; then
            echo "invalid move format: $MOVE" >&2
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "move=$MOVE" >> $GITHUB_OUTPUT

      - name: apply player move + bot counter-move
        if: steps.parse.outputs.valid == 'true'
        id: apply
        run: |
          OUTPUT=$(node chess/move.js "${{ steps.parse.outputs.move }}" 2>&1)
          echo "$OUTPUT"
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: re-render board image
        if: steps.parse.outputs.valid == 'true'
        run: npm run render

      - name: regenerate README chess section
        if: steps.parse.outputs.valid == 'true'
        run: npm run update-readme

      - name: commit + push
        if: steps.parse.outputs.valid == 'true'
        run: |
          git config user.name "afk1997-bot"
          git config user.email "actions@github.com"
          git add chess/state.fen chess/board.svg README.md
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            MOVE='${{ steps.parse.outputs.move }}'
            ISSUE_USER='${{ github.event.issue.user.login }}'
            git commit -m "chess: ${MOVE} (by @${ISSUE_USER})"
            git push origin main
          fi

      - name: comment on issue + close
        if: github.event_name == 'issues' && steps.parse.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ steps.apply.outputs.result }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `\`\`\`\n${result}\n\`\`\`\n\nBoard updated: https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/README.md`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: comment on invalid move + close
        if: github.event_name == 'issues' && steps.parse.outputs.valid != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'invalid move format. expected `chess|move|<from><to>` like `chess|move|e2e4`. closing.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
